name: prod-baseline

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  prod-baseline:
    name: Production baseline checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run production baseline checks
        run: npm run prod:baseline:check

      - name: Verify signed release manifests
        run: npm run prod:release:verify
