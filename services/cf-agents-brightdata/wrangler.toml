name = "cf-agents-brightdata"
main = "src/server.ts"
compatibility_date = "2026-03-07"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[vars]
AI_MODEL = "@cf/zai-org/glm-4.7-flash"
SYSTEM_PROMPT = "You are a web research agent running on Cloudflare Workers. Use Bright Data MCP tools when live web evidence is needed. Cite concrete URLs in your answers."

[[durable_objects.bindings]]
name = "BRIGHTDATA_AGENT"
class_name = "BrightDataChatAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BrightDataChatAgent"]
